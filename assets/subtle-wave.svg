<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" width="1440" height="120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#0d2618"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;0%;100%" dur="12s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="120" fill="#0d1117"/>
  <path
    d="M0,68 C120,52 240,52 360,68 C480,84 600,84 720,68 C840,52 960,52 1080,68 C1200,84 1320,84 1440,68 V120 H0 Z"
    fill="url(#waveGrad)"
    opacity="0.9"
    filter="url(#softGlow)"
  >
    <animate
      attributeName="d"
      dur="10s"
      repeatCount="indefinite"
      values="
        M0,68 C120,52 240,52 360,68 C480,84 600,84 720,68 C840,52 960,52 1080,68 C1200,84 1320,84 1440,68 V120 H0 Z;
        M0,72 C120,90 240,44 360,62 C480,80 600,96 720,72 C840,48 960,48 1080,72 C1200,96 1320,80 1440,62 V120 H0 Z;
        M0,68 C120,52 240,52 360,68 C480,84 600,84 720,68 C840,52 960,52 1080,68 C1200,84 1320,84 1440,68 V120 H0 Z"
    />
  </path>
  <path
    d="M0,74 C160,58 320,58 480,74 C640,90 800,90 960,74 C1120,58 1280,58 1440,74"
    fill="none"
    stroke="#00ff9f"
    stroke-opacity="0.14"
    stroke-width="2"
  >
    <animate attributeName="stroke-dasharray" values="0 1200;140 1060;0 1200" dur="8s" repeatCount="indefinite" />
  </path>
</svg>
