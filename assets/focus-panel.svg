<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Focus panel">
  <defs>
    <linearGradient id="focusBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1018"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="focusBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff9f"/>
      <stop offset="50%" stop-color="#4c9eff"/>
      <stop offset="100%" stop-color="#00ff9f"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="focusGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="transparent"/>
  <rect x="28" y="24" width="1144" height="372" rx="20" ry="20" fill="url(#focusBg)" stroke="url(#focusBorder)" stroke-width="2" filter="url(#focusGlow)"/>
  <rect x="28" y="24" width="1144" height="46" rx="20" ry="20" fill="#0f1622" opacity="0.95"/>
  <rect x="28" y="68" width="1144" height="1" fill="#1f2a3a" opacity="0.8"/>

  <g font-family="JetBrains Mono, Consolas, monospace" fill="#d7e7ff">
    <text x="56" y="54" font-size="16" fill="#7ea2d6">focus</text>

    <g>
      <rect x="52" y="104" width="1096" height="42" rx="12" fill="#0f1726" opacity="0.0">
        <animate attributeName="opacity" values="0;0.18;0.12;0.18;0.1" dur="5s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <circle cx="74" cy="125" r="5" fill="#00ff9f">
        <animate attributeName="r" values="4;6;4" dur="1.4s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <text x="98" y="131" font-size="20" fill="#cfe6ff">
        Infrastructure and deployment automation
        <animate attributeName="x" values="88;98" dur="0.8s" begin="0s" fill="freeze"/>
        <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0s" fill="freeze"/>
      </text>
      <rect x="98" y="138" width="370" height="2" fill="#00ff9f" opacity="0.16">
        <animate attributeName="opacity" values="0.08;0.24;0.08" dur="3.2s" begin="0s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g>
      <rect x="52" y="160" width="1096" height="42" rx="12" fill="#0f1726" opacity="0.0">
        <animate attributeName="opacity" values="0;0.18;0.12;0.18;0.1" dur="5s" begin="0.35s" repeatCount="indefinite"/>
      </rect>
      <circle cx="74" cy="181" r="5" fill="#4c9eff">
        <animate attributeName="r" values="4;6;4" dur="1.4s" begin="0.25s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" begin="0.25s" repeatCount="indefinite"/>
      </circle>
      <text x="98" y="187" font-size="20" fill="#cfe6ff">
        Monitoring, logging, and alerting stacks
        <animate attributeName="x" values="88;98" dur="0.8s" begin="0.25s" fill="freeze"/>
        <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.25s" fill="freeze"/>
      </text>
      <rect x="98" y="194" width="300" height="2" fill="#4c9eff" opacity="0.16">
        <animate attributeName="opacity" values="0.08;0.22;0.08" dur="3.2s" begin="0.25s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g>
