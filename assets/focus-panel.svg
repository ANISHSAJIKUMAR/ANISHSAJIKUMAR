        <animate attributeName="opacity" values="0;0.18;0.12;0.18;0.1" dur="5s" begin="0.7s" repeatCount="indefinite"/>
      </rect>
      <circle cx="74" cy="237" r="5" fill="#00ff9f">
        <animate attributeName="r" values="4;6;4" dur="1.4s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <text x="98" y="243" font-size="20" fill="#cfe6ff">
        Kubernetes and Terraform workflows
        <animate attributeName="x" values="88;98" dur="0.8s" begin="0.5s" fill="freeze"/>
        <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
      </text>
      <rect x="98" y="250" width="278" height="2" fill="#00ff9f" opacity="0.16">
        <animate attributeName="opacity" values="0.08;0.22;0.08" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g>
      <rect x="52" y="272" width="1096" height="42" rx="12" fill="#0f1726" opacity="0.0">
        <animate attributeName="opacity" values="0;0.18;0.12;0.18;0.1" dur="5s" begin="1.05s" repeatCount="indefinite"/>
      </rect>
      <circle cx="74" cy="293" r="5" fill="#4c9eff">
        <animate attributeName="r" values="4;6;4" dur="1.4s" begin="0.75s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" begin="0.75s" repeatCount="indefinite"/>
      </circle>
      <text x="98" y="299" font-size="20" fill="#cfe6ff">
        CI/CD pipelines and release engineering
        <animate attributeName="x" values="88;98" dur="0.8s" begin="0.75s" fill="freeze"/>
        <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.75s" fill="freeze"/>
      </text>
      <rect x="98" y="306" width="320" height="2" fill="#4c9eff" opacity="0.16">
        <animate attributeName="opacity" values="0.08;0.22;0.08" dur="3.2s" begin="0.75s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g>
      <rect x="52" y="328" width="1096" height="42" rx="12" fill="#0f1726" opacity="0.0">
        <animate attributeName="opacity" values="0;0.18;0.12;0.18;0.1" dur="5s" begin="1.4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="74" cy="349" r="5" fill="#00ff9f">
        <animate attributeName="r" values="4;6;4" dur="1.4s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <text x="98" y="355" font-size="20" fill="#cfe6ff">
        Internal tools that remove repetitive manual work
