<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="1200" height="430" role="img" aria-label="whoami terminal panel">
  <defs>
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1018"/>
      <stop offset="55%" stop-color="#09131d"/>
      <stop offset="100%" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff9f"/>
      <stop offset="50%" stop-color="#4c9eff"/>
      <stop offset="100%" stop-color="#00ff9f"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;0%;100%" dur="10s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="panelClip">
      <rect x="40" y="40" width="1120" height="350" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <rect width="1200" height="430" fill="transparent"/>
  <rect x="40" y="40" width="1120" height="350" rx="20" ry="20" fill="url(#panelBg)" stroke="url(#panelGlow)" stroke-width="2" filter="url(#softGlow)"/>
  <rect x="40" y="40" width="1120" height="44" rx="20" ry="20" fill="#0f1622" opacity="0.95"/>
  <rect x="40" y="62" width="1120" height="1" fill="#1f2a3a" opacity="0.8"/>

  <circle cx="72" cy="62" r="6" fill="#ff5f56"/>
  <circle cx="94" cy="62" r="6" fill="#ffbd2e"/>
  <circle cx="116" cy="62" r="6" fill="#27c93f"/>

  <g clip-path="url(#panelClip)" font-family="JetBrains Mono, Consolas, monospace" fill="#d7e7ff">
    <text x="66" y="116" font-size="16" fill="#7ea2d6">$ whoami</text>
    <text x="66" y="150" font-size="22" fill="#00ff9f" font-weight="700">Anish Saji Kumar</text>

    <text x="66" y="198" font-size="16" fill="#7ea2d6">$ cat /etc/profile.d/devops.conf</text>
    <text x="66" y="232" font-size="18">ROLE="DevOps Engineer · SRE · Platform Engineer"</text>
    <text x="66" y="262" font-size="18">LOCATION="Kerala, India (UTC+5:30)"</text>
    <text x="66" y="292" font-size="18">MISSION="Build reliable systems, automate toil, and make delivery boring."</text>

    <text x="66" y="332" font-size="16" fill="#7ea2d6">$ printf "currently"</text>
    <text x="66" y="360" font-size="18" fill="#cfe6ff">- GitOps with ArgoCD</text>
    <text x="330" y="360" font-size="18" fill="#cfe6ff">- Observability with Prometheus, Grafana, Loki</text>
    <text x="66" y="388" font-size="18" fill="#cfe6ff">- Terraform-based infrastructure</text>
    <text x="420" y="388" font-size="18" fill="#cfe6ff">- CI/CD and deployment automation</text>

    <rect x="792" y="274" width="10" height="22" rx="2" fill="#00ff9f" opacity="0.95">
      <animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite" />
    </rect>

    <text x="66" y="420" font-size="14" fill="#46607f">status: building reliable systems, not busywork</text>
  </g>
</svg>
